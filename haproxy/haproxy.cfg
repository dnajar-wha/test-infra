global
    daemon

defaults
    mode http    
    timeout connect 5s    
    timeout client 50s    
    timeout server 50s

frontend http_front
    bind *:80
    default_backend app_servers

backend app_servers
    balance roundrobin

    server app1 app1:80 check
    server app2 app2:80 check

listen stats
    bind *:8404
    mode http

    stats enable
    stats uri /stats
    stats refresh 5s

    stats auth admin:ad*in123

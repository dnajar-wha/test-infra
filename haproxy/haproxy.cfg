global
    log stdout format raw local0 info
    daemon

defaults
    mode http
    log global
    option httplog
    option dontlognull
    timeout connect 5s
    timeout client 50s
    timeout server 50s
    timeout http-request 10s

frontend http_front
    bind *:80
    default_backend app_servers

    # Health check endpoint passthrough
    acl is_health path /health

    # Logging
    capture request header Host len 64
    capture request header User-Agent len 128

backend app_servers
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200

    server app1 app1:80 check inter 5s fall 3 rise 2
    server app2 app2:80 check inter 5s fall 3 rise 2

listen stats
    bind *:8404
    mode http

    stats enable
    stats uri /stats
    stats refresh 5s
    stats auth ${HAPROXY_STATS_USER}:${HAPROXY_STATS_PASS}

    # Hide HAProxy version in stats
    stats show-legends
    stats show-node
